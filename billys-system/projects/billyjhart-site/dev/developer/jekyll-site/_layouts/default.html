<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <link rel="preload" href="{{ '/assets/css/main.css' | relative_url }}" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}"></noscript>
    
    <!-- SEO tags removed for minimal setup -->
</head>
<body id="top">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    {% include header.html %}
    
    {{ content }}
    
    {% include footer.html %}

    {% if page.layout == 'blog' %}
    <script>
        // Blog functionality preserved from original
        const posts = [
            {
                id: 'hello-world',
                title: 'Hello World',
                author: 'Billy J Hart',
                date: '2026-02-27',
                readTime: '2 min',
                categories: ['Personal'],
                excerpt: 'Welcome to my new blog! This is where I\'ll share thoughts on technology, AI agents, leadership, and career insights.',
                content: `
                <p>Welcome to my new blog! I'm excited to share thoughts and insights on technology, AI agents, leadership, and career development.</p>
                <p>This space will cover topics I'm passionate about:</p>
                <ul>
                    <li><strong>AI and Agents:</strong> Exploring agentic AI systems and their enterprise applications</li>
                    <li><strong>Technology:</strong> Architecture patterns, database design, and emerging technologies</li>
                    <li><strong>Career:</strong> Lessons learned from 30+ years in technology roles</li>
                    <li><strong>Leadership:</strong> Managing teams, projects, and driving technical innovation</li>
                </ul>
                <p>Stay tuned for more posts. Thanks for reading!</p>
                `
            }
        ];

        let currentView = 'index';
        let currentFilter = 'All';

        function showBlogIndex() {
            currentView = 'index';
            updateURL();
            renderBlogIndex();
        }

        function showPost(postId) {
            currentView = 'post';
            currentPostId = postId;
            updateURL();
            renderPost(postId);
        }

        function updateURL() {
            const url = currentView === 'index' ? 
                '/blog/' : 
                `/blog/${currentPostId}/`;
            
            window.history.pushState(
                { view: currentView, postId: currentPostId }, 
                '', 
                url
            );
        }

        function renderBlogIndex() {
            const filteredPosts = currentFilter === 'All' ? 
                posts : 
                posts.filter(post => post.categories.includes(currentFilter));

            const postsHtml = filteredPosts.map(post => `
                <article class="post-card" onclick="showPost('${post.id}')">
                    <div class="post-meta">
                        <span>${post.author}</span>
                        <span class="meta-separator"></span>
                        <span>${post.date}</span>
                        <span class="meta-separator"></span>
                        <span>${post.readTime}</span>
                    </div>
                    <h2 class="post-title">
                        <a href="#" onclick="event.preventDefault(); showPost('${post.id}')">${post.title}</a>
                    </h2>
                    <p class="post-excerpt">${post.excerpt}</p>
                    <div class="post-categories">
                        ${post.categories.map(cat => `<span class="badge">${cat}</span>`).join('')}
                    </div>
                </article>
            `).join('');

            document.getElementById('main-content').innerHTML = `
                <div class="blog-hero container">
                    <h1>Blog</h1>
                </div>

                <section class="blog-filters container">
                    <button class="filter-btn ${currentFilter === 'All' ? 'active' : ''}" onclick="filterPosts('All')">All</button>
                    <button class="filter-btn ${currentFilter === 'Personal' ? 'active' : ''}" onclick="filterPosts('Personal')">Personal</button>
                    <button class="filter-btn ${currentFilter === 'Technology' ? 'active' : ''}" onclick="filterPosts('Technology')">Technology</button>
                    <button class="filter-btn ${currentFilter === 'AI/Agents' ? 'active' : ''}" onclick="filterPosts('AI/Agents')">AI/Agents</button>
                </section>

                <section class="blog-posts container">
                    ${postsHtml}
                </section>
            `;
        }

        function renderPost(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) {
                renderBlogIndex();
                return;
            }

            document.getElementById('main-content').innerHTML = `
                <article class="post-content container">
                    <nav style="margin-bottom: 2rem;">
                        <a href="#" onclick="event.preventDefault(); showBlogIndex();">← Back to Blog</a>
                    </nav>
                    
                    <header>
                        <div class="post-meta">
                            <span>${post.author}</span>
                            <span class="meta-separator"></span>
                            <span>${post.date}</span>
                            <span class="meta-separator"></span>
                            <span>${post.readTime}</span>
                        </div>
                        <h1>${post.title}</h1>
                        <div class="post-categories" style="margin-bottom: 2rem;">
                            ${post.categories.map(cat => `<span class="badge">${cat}</span>`).join('')}
                        </div>
                    </header>
                    
                    <section>
                        ${post.content}
                    </section>
                    
                    <div class="author-card">
                        <img src="{{ '/assets/images/billy-memoji.jpg' | relative_url }}" alt="Billy J Hart" class="author-avatar">
                        <div class="author-info">
                            <h4>Billy J Hart</h4>
                            <div class="author-title">Technology Solution Architect</div>
                            <p class="author-bio">{{ site.author.bio }}</p>
                            <div class="author-links">
                                <a href="{{ site.author.linkedin }}" target="_blank">LinkedIn</a>
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        function filterPosts(filter) {
            currentFilter = filter;
            renderBlogIndex();
        }

        // Handle browser back/forward
        window.addEventListener('popstate', function(event) {
            if (event.state) {
                currentView = event.state.view;
                currentPostId = event.state.postId;
                
                if (currentView === 'post') {
                    renderPost(currentPostId);
                } else {
                    renderBlogIndex();
                }
            } else {
                showBlogIndex();
            }
        });

        // Initialize based on current URL
        document.addEventListener('DOMContentLoaded', function() {
            const path = window.location.pathname;
            
            if (path === '/blog/' || path === '/blog') {
                showBlogIndex();
            } else if (path.startsWith('/blog/') && path !== '/blog/') {
                const postId = path.replace('/blog/', '').replace('/', '');
                showPost(postId);
            } else {
                showBlogIndex();
            }
        });
    </script>
    {% endif %}
</body>
</html>
