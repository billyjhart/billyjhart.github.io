<header class="site-header">
    <nav class="site-nav container">
        <a href="{{ '/' | relative_url }}" class="site-logo">
            <img src="{{ '/assets/images/billy-memoji.jpg' | relative_url }}" alt="Billy J Hart">
            Billy J Hart
        </a>
        <ul class="nav-links">
            {% for nav_item in site.navigation %}
            <li>
                <a href="{{ nav_item.url | relative_url }}" 
                   {% if page.url == nav_item.url %}class="active"{% endif %}>
                   {{ nav_item.name }}
                </a>
            </li>
            {% endfor %}
        </ul>
    </nav>
</header>
