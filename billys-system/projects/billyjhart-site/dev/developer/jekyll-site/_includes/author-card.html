<div class="author-card">
    <img src="{{ site.author.image | relative_url }}" alt="{{ site.author.name }}" class="author-avatar">
    <div class="author-info">
        <h4>{{ site.author.name }}</h4>
        <div class="author-title">{{ site.author.title }}</div>
        <p class="author-bio">{{ site.author.bio }}</p>
        <div class="author-links">
            <a href="{{ site.author.linkedin }}" target="_blank">LinkedIn</a>
        </div>
    </div>
</div>
