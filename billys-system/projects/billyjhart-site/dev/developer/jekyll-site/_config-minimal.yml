# Minimal Jekyll Configuration for testing

# Site settings
title: "Billy Hart – Technology Solution Architect"
description: "Technology Solution Architect specializing in AI-enabled enterprise solutions"
baseurl: ""
url: "http://localhost:4000"

# Author information
author:
  name: Billy Hart
  title: Technology Solution Architect
  bio: "Passionate about enterprise solutions, data design, and exploring emerging technologies like OpenClaw. Learning how AI agents can solve real problems."
  linkedin: "https://www.linkedin.com/in/billyhart/"
  image: "/assets/images/billy-memoji.jpg"

# Build settings
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Defaults  
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"  
    values:
      layout: "page"

# Performance optimizations
future: false
show_drafts: false
limit_posts: 10

# Navigation
navigation:
  - name: Portfolio
    url: /
  - name: Agent System
    url: /agents
  - name: Blog
    url: /blog