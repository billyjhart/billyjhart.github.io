# Jekyll Configuration for billyjhart.github.io

# Site settings
title: "Billy Hart – Technology Solution Architect"
description: "Technology Solution Architect specializing in AI-enabled enterprise solutions across Finance, Telecom, and Healthcare. Currently advancing agentic AI implementation."
baseurl: ""
url: "https://billyjhart.github.io"

# Author information
author:
  name: Billy Hart
  title: Technology Solution Architect
  bio: "Architect scalable enterprise systems across Finance, Telecom, and Healthcare. Lead development teams delivering complex solutions. Currently advancing agentic AI implementation."
  linkedin: "https://www.linkedin.com/in/billyhart/"
  image: "/assets/images/billy-memoji.jpg"

# Build settings
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Billy Hart"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Navigation
navigation:
  - name: Portfolio
    url: /
  - name: Agent System
    url: /agents
  - name: Blog
    url: /blog

# Performance optimizations for Pi deployment
future: false
show_drafts: false
limit_posts: 10